<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="Drone Commander.png">
    <title>Drone Commander</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: sans-serif;
        overflow: hidden;
      }
      #container {
        display: flex;
        height: 100%;
        width: 100%;
      }
      #leftPanel {
        width: calc(100% - 500px);
        padding: 10px;
        box-sizing: border-box;
        background: #f0f0f0;
        overflow: auto;
      }
      #divider {
        width: 5px;
        background-color: #ccc;
        cursor: ew-resize;
      }
      #rightPanel {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
      }
      #rightPanel  button {
        font-size: 16px; 
        line-height: 1;
        padding: 5px 10px;
        margin:2px;
        vertical-align: middle;
        margin-right: 5px;
      }
      #webglContainer {
        flex: 3;
        position: relative;
        overflow: hidden;
        background: #ddd;
      }
      #statusPanel {
        flex: 1;
        background: #ddd;
        padding: 10px;
        overflow: auto;
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 75px;
        font-size: 12px;
      }
      #statusPanel table {
        width: calc(100% - 50px);
      }
      #statusPanel input {
        width: 50px;
      }
      #blocklyDiv {
        height: calc(100% - 50px);
        width: 100%;
        border: 1px solid #ccc;
      }
      #menu {        
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 5px;
        flex-wrap: wrap;
      }
      #menu img {
        margin-top: -23px;
        margin-bottom: -23px;
      }
      #scenarioControls {
        display: flex;
        gap: 5px;
        flex: 0 1 260px;
        min-width: 220px;
      }
      #scenarioControls select {
        flex: 1;
        min-width: 0;
      }
      #viewerToolbar {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        min-height: 36px;
        padding-left: 6px;
        padding-right: 6px;
        box-sizing: border-box;
      }
      #fileNameLabel {
        max-width: 180px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
        font-weight: bold;
        margin: 0 auto 0 2px;
      }
      button{
        margin-right:5px;
      }
      
      .blocklyTreeLabel {
        padding: 4px 8px;
        font-size: 16px;
        font-weight: bold;
        font-family: "Segoe UI", sans-serif;
      }

      .blocklyTreeRow {
        background: none !important; 
        border-radius: 0 !important;
        margin-bottom: 2px;
      }

      .blocklyTreeRow:hover {
        background-color: #e0e0e0 !important;
      }

      .blocklyToolboxCategory[data-category-id="logic"] > .blocklyTreeRow > .blocklyTreeLabel { color: #4B9CD3; }
      .blocklyToolboxCategory[data-category-id="loops"] > .blocklyTreeRow > .blocklyTreeLabel { color: #F7C948; }
      .blocklyToolboxCategory[data-category-id="math"] > .blocklyTreeRow > .blocklyTreeLabel { color: #F86624; }
      .blocklyToolboxCategory[data-category-id="text"] > .blocklyTreeRow > .blocklyTreeLabel { color: #8C6BB1; }
      .blocklyToolboxCategory[data-category-id="lists"] > .blocklyTreeRow > .blocklyTreeLabel { color: #3AAFB9; }
      .blocklyToolboxCategory[data-category-id="variables"] > .blocklyTreeRow > .blocklyTreeLabel { color: #FF8C42; }
      .blocklyToolboxCategory[data-category-id="functions"] > .blocklyTreeRow > .blocklyTreeLabel { color: #DB5461; }
      .blocklyToolboxCategory[data-category-id="drone"] > .blocklyTreeRow > .blocklyTreeLabel { color: #20A39E; }
      .blocklyToolboxCategory[data-category-id="sensors"] > .blocklyTreeRow > .blocklyTreeLabel { color: #90BE6D; }
      .blocklyToolboxCategory[data-category-id="flow"] > .blocklyTreeRow > .blocklyTreeLabel { color: #888888; }
      
    </style>
    <!-- Include Blockly -->
    <script src="libs/blockly_compressed.min.js"></script>
    <script src="libs/blocks_compressed.min.js"></script>
    <script src="libs/Msg/en.js"></script>
    <script src="libs/javascript_compressed.min.js"></script>
    <!-- Include Three.js -->
    <script src="libs/three.min.js"></script>
    <script src="libs/STLLoader.js"></script>  
    <script src="libs/MTLLoader.js"></script>  
    <script src="libs/OBJLoader.js"></script>  
    
  </head>
  <body>
    <div id="container">
      <div id="leftPanel">
        <div id="menu">
          <img src="Drone Commander.png" width="64px">    
          <select id="languageSelect">
            <option value="en">English</option>
            <option value="it">Italiano</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
            <option value="pt">Português</option>
          </select>
          <button id="newBtn">New</button>
          <button id="loadBtn">Load</button>
          <button id="saveBtn">Save</button>
          <div id="scenarioControls">
            <select id="scenarioSelect">
              <option value=""></option>
            </select>
            <select id="graphicsSelect">
              <option value="performance"></option>
              <option value="balanced"></option>
              <option value="quality"></option>
            </select>
            <button id="helpBtn"></button>
          </div>

          <input type="file" id="fileInput" style="display:none">
        </div>
        <div id="blocklyDiv"></div>
      </div>
      <div id="divider"></div>
      <div id="rightPanel">
        <div id="viewerToolbar">
          <button id="toggleWebglBtn" >🗖</button>
          <span id="fileNameLabel"></span>
          <button id="runBtn" ><font color='green'>▶</font></button>
          <button id="stopBtn" disabled ><font color='red'>■</font></button>
        </div>
        <div id="webglContainer"></div>
        <div id="statusPanel">
          <table>
            <tr>
              <td id="labelX">X:</td><td><input type="number" id="x" value="0" step="0.1"></td>
              <td id="labelZ">Z:</td><td><input type="number" id="z" value="0" step="0.1"></td>
            </tr>
            <tr>
              <td id="labelAlt">Altitude:</td><td><input type="number" id="altitude" value="1.5" step="0.1"></td>
              <td id="labelDir">Direction:</td><td><input type="number" id="direction" value="0" step="1"></td>
            </tr>
            <tr>
              <td colspan="2"><span id="labelStatus">Status:</span> <span id="flightStatus">On Ground</span></td>
            </tr>
          </table>
        </div>
      </div>
    </div>
    
    <script>
      // --- Definition of custom blocks ---
      const customBlockTypes = [
        "take_off", "land", "return_to_base", "set_altitude", "change_altitude", "set_angle",
        "change_angle", "slide", "walk", "go_to", "move_by",
        "wait", "smoke", "set_speed", "sensor_keypressed", "sensor_x",
        "sensor_z", "sensor_altitude", "sensor_direction", "sensor_speed",
        "start_block", "end_block"
      ];

      function defineCustomBlocks(){
        customBlockTypes.forEach(type => {
          if (Blockly.Blocks[type]) delete Blockly.Blocks[type];
        });
        Blockly.defineBlocksWithJsonArray([
          {
            "type": "take_off",
            "message0": Blockly.Msg["BKY_DRONE_TAKEOFF"],
            "previousStatement": null,
            "nextStatement": null,
            "colour": 20,
            "tooltip": Blockly.Msg["BKY_DRONE_TAKEOFF_TOOLTIP"]
          },
          {
            "type": "land",
            "message0": Blockly.Msg["BKY_DRONE_LAND"],
            "previousStatement": null,
            "nextStatement": null,
            "colour": 20,
            "tooltip": Blockly.Msg["BKY_DRONE_LAND_TOOLTIP"]
          },
          {
            "type": "set_altitude",
            "message0": Blockly.Msg["BKY_DRONE_SET_ALTITUDE"],
            "args0": [
              { "type": "input_value", "name": "ALTITUDE", "check": "Number" }
            ],
            "inputsInline": true,
            "previousStatement": null,
            "nextStatement": null,
            "colour": 20,
            "tooltip": Blockly.Msg["BKY_DRONE_SET_ALTITUDE_TOOLTIP"]
          },
          {
            "type": "change_altitude",
            "message0": Blockly.Msg["BKY_DRONE_CHANGE_ALTITUDE"],
            "args0": [
              { "type": "input_value", "name": "ALTITUDE", "check": "Number" }
            ],
            "inputsInline": true,
            "previousStatement": null,
            "nextStatement": null,
            "colour": 20,
            "tooltip": Blockly.Msg["BKY_DRONE_CHANGE_ALTITUDE_TOOLTIP"]
          },
          {
            "type": "set_angle",
            "message0": Blockly.Msg["BKY_DRONE_SET_ANGLE"],
            "args0": [
              { "type": "input_value", "name": "ANGLE", "check": "Number" }
            ],
            "inputsInline": true,
            "previousStatement": null,
            "nextStatement": null,
            "colour": 20,
            "tooltip": Blockly.Msg["BKY_DRONE_SET_ANGLE_TOOLTIP"]
          },
          {
            "type": "change_angle",
            "message0": Blockly.Msg["BKY_DRONE_CHANGE_ANGLE"],
            "args0": [
              { "type": "input_value", "name": "ANGLE", "check": "Number" }
            ],
            "inputsInline": true,
            "previousStatement": null,
            "nextStatement": null,
            "colour": 20,
            "tooltip": Blockly.Msg["BKY_DRONE_CHANGE_ANGLE_TOOLTIP"]
          },
          {
            "type": "slide",
            "message0": Blockly.Msg["BKY_DRONE_SLIDE"],
            "args0": [
              { "type": "input_value", "name": "SLIDE", "check": "Number" }
            ],
            "inputsInline": true,
            "previousStatement": null,
            "nextStatement": null,
            "colour": 20,
            "tooltip": Blockly.Msg["BKY_DRONE_SLIDE_TOOLTIP"]
          },
          {
            "type": "walk",
            "message0": Blockly.Msg["BKY_DRONE_WALK"],
            "args0": [
              { "type": "input_value", "name": "DIST", "check": "Number" }
            ],
            "inputsInline": true,
            "previousStatement": null,
            "nextStatement": null,
            "colour": 20,
            "tooltip": Blockly.Msg["BKY_DRONE_WALK_TOOLTIP"]
          },
          {
            "type": "go_to",
            "message0": Blockly.Msg["BKY_DRONE_GO_TO"],
            "args0": [
              { "type": "input_value", "name": "X", "check": "Number" },
              { "type": "input_value", "name": "Y", "check": "Number" },
              { "type": "input_value", "name": "Z", "check": "Number" }
            ],
            "inputsInline": true,
            "previousStatement": null,
            "nextStatement": null,
            "colour": 20,
            "tooltip": Blockly.Msg["BKY_DRONE_GO_TO_TOOLTIP"]
          },
          {
            "type": "move_by",
            "message0": Blockly.Msg["BKY_DRONE_MOVE_BY"],
            "args0": [
              { "type": "input_value", "name": "X", "check": "Number" },
              { "type": "input_value", "name": "Y", "check": "Number" },
              { "type": "input_value", "name": "Z", "check": "Number" }
            ],
            "inputsInline": true,
            "previousStatement": null,
            "nextStatement": null,
            "colour": 20,
            "tooltip": Blockly.Msg["BKY_DRONE_MOVE_BY_TOOLTIP"]
          },
          {
            "type": "return_to_base",
            "message0": Blockly.Msg["BKY_DRONE_RETURN_TO_BASE"],
            "previousStatement": null,
            "nextStatement": null,
            "colour": 20,
            "tooltip": Blockly.Msg["BKY_DRONE_RETURN_TO_BASE_TOOLTIP"]
          },
          {
            "type": "wait",
            "message0": Blockly.Msg["BKY_DRONE_WAIT"],
            "args0": [
              { "type": "input_value", "name": "DIST", "check": "Number" }
            ],
            "inputsInline": true,
            "previousStatement": null,
            "nextStatement": null,
            "colour": 20,
            "tooltip": Blockly.Msg["BKY_DRONE_WAIT_TOOLTIP"]
          },
          {
            "type": "smoke",
            "message0": Blockly.Msg["BKY_DRONE_SMOKE"],
            "args0": [
              { "type": "input_value", "name": "SMOKE", "check": "Boolean" }
            ],
            "previousStatement": null,
            "nextStatement": null,
            "colour": 20,
            "tooltip": Blockly.Msg["BKY_DRONE_SMOKE_TOOLTIP"]
          },
          {
            "type": "set_speed",
            "message0": Blockly.Msg["BKY_DRONE_SPEED"],
            "args0": [
              { "type": "input_value", "name": "SPEED", "check": "Number" }
            ],
            "inputsInline": true,
            "previousStatement": null,
            "nextStatement": null,
            "colour": 20,
            "tooltip": Blockly.Msg["BKY_DRONE_SPEED_TOOLTIP"]
          },          
          {
            "type": "sensor_keypressed",
            "message0": Blockly.Msg["BKY_SENSOR_KEYPRESSED"],
            "args0": [
              {
                "type": "field_dropdown",
                "name": "KEY",
                "options": [
                  [Blockly.Msg["ARROW_UP"], "ARROW_UP"], [Blockly.Msg["ARROW_DOWN"], "ARROW_DOWN"],
                  [Blockly.Msg["ARROW_LEFT"], "ARROW_LEFT"], [Blockly.Msg["ARROW_RIGHT"], "ARROW_RIGHT"],
                  [Blockly.Msg["SPACE"], "SPACE"], [Blockly.Msg["RETURN"], "RETURN"],
                  ["A", "A"], ["B", "B"], ["C", "C"], ["D", "D"],
                  ["E", "E"], ["F", "F"], ["G", "G"], ["H", "H"],
                  ["I", "I"], ["J", "J"], ["K", "K"], ["L", "L"],
                  ["M", "M"], ["N", "N"], ["O", "O"], ["P", "P"],
                  ["Q", "Q"], ["R", "R"], ["S", "S"], ["T", "T"],
                  ["U", "U"], ["V", "V"], ["W", "W"], ["X", "X"],
                  ["Y", "Y"], ["Z", "Z"]
                ]
              }
            ],
            "output": "Boolean",
            "colour": 90,
            "tooltip": Blockly.Msg["BKY_SENSOR_KEYPRESSED_TOOLTIP"],
            "helpUrl": ""
          },
          {
            "type": "sensor_x",
            "message0": Blockly.Msg["BKY_SENSOR_X"],
            "output": "Numeric",
            "colour": 90,
            "tooltip": Blockly.Msg["BKY_SENSOR_X_TOOLTIP"],
            "helpUrl": ""
          },
          {
            "type": "sensor_z",
            "message0": Blockly.Msg["BKY_SENSOR_Z"],
            "output": "Numeric",
            "colour": 90,
            "tooltip": Blockly.Msg["BKY_SENSOR_Z_TOOLTIP"],
            "helpUrl": ""
          },
          {
            "type": "sensor_altitude",
            "message0": Blockly.Msg["BKY_SENSOR_ALTITUDE"],
            "output": "Numeric",
            "colour": 90,
            "tooltip": Blockly.Msg["BKY_SENSOR_ALTITUDE_TOOLTIP"],
            "helpUrl": ""
          },
          {
            "type": "sensor_direction",
            "message0": Blockly.Msg["BKY_SENSOR_DIRECTION"],
            "output": "Numeric",
            "colour": 90,
            "tooltip": Blockly.Msg["BKY_SENSOR_DIRECTION_TOOLTIP"],
            "helpUrl": ""
          },
          {
            "type": "sensor_speed",
            "message0": Blockly.Msg["BKY_SENSOR_SPEED"],
            "output": "Number",
            "colour": 90,
            "tooltip": Blockly.Msg["BKY_SENSOR_SPEED_TOOLTIP"],
            "helpUrl": ""
          },
          {
            "type": "start_block",
            "message0": Blockly.Msg["BKY_FLOW_START"],
            "nextStatement": null,
            "colour": 60,
            "tooltip": Blockly.Msg["BKY_FLOW_START_TOOLTIP"],
            "hat": "cap"
          },
          {
            "type": "end_block",
            "message0": Blockly.Msg["BKY_FLOW_END"],
            "previousStatement": null,
            "colour": 0,
            "tooltip": Blockly.Msg["BKY_FLOW_END_TOOLTIP"]
          }
        ]);
      }

      const makecodeTheme = Blockly.Theme.defineTheme('makecode', {
        base: Blockly.Themes.Classic,
        blockStyles: {
          logic_blocks: { colourPrimary: "#4B9CD3" },
          loops_blocks: { colourPrimary: "#F7C948" },
          math_blocks: { colourPrimary: "#F86624" },
          text_blocks: { colourPrimary: "#8C6BB1" },
          list_blocks: { colourPrimary: "#3AAFB9" },
          variable_blocks: { colourPrimary: "#FF8C42" },
          procedure_blocks: { colourPrimary: "#DB5461" },
          drone_blocks: { colourPrimary: "#20A39E" },
          sensor_blocks: { colourPrimary: "#90BE6D" }
        },
        categoryStyles: {
          logic_category: { colour: "#4B9CD3" },
          loops_category: { colour: "#F7C948" },
          math_category: { colour: "#F86624" },
          text_category: { colour: "#8C6BB1" },
          lists_category: { colour: "#3AAFB9" },
          variables_category: { colour: "#FF8C42" },
          functions_category: { colour: "#DB5461" },
          drone_category: { colour: "#20A39E" },
          sensors_category: { colour: "#90BE6D" },
          flow_category: { colour: "#888" }
        },
        fontStyle: {
          family: 'Segoe UI, sans-serif',
          size: 14
        },
        componentStyles: {
          workspaceBackgroundColour: "#ffffff",
          toolboxBackgroundColour: "#eeeeee",
          toolboxForegroundColour: "#000000",
          flyoutBackgroundColour: "#f0f0f0",
          flyoutForegroundColour: "#000000",
          flyoutOpacity: 1,
          scrollbarColour: "#cccccc",
          insertionMarkerColour: "#000000",
          insertionMarkerOpacity: 0.3,
          cursorColour: "#d0d0d0"
        }
      });
      
      // --- Generators for custom blocks ---
      // --- Drone ---
      Blockly.JavaScript.forBlock['take_off'] = block => 'await drone.takeOff();\n';
      Blockly.JavaScript.forBlock['land'] = block => 'await drone.land();\n';
      Blockly.JavaScript.forBlock['set_altitude'] = block => {
        var altitude = Blockly.JavaScript.valueToCode(block, 'ALTITUDE', Blockly.JavaScript.ORDER_ATOMIC) || '0';
        return 'await drone.setAltitude(' + altitude + ');\n';
      };
      Blockly.JavaScript.forBlock['change_altitude'] = block => {
        var altitude = Blockly.JavaScript.valueToCode(block, 'ALTITUDE', Blockly.JavaScript.ORDER_ATOMIC) || '0';
        return 'await drone.changeAltitude(' + altitude + ');\n';
      };
      Blockly.JavaScript.forBlock['set_angle'] = block => {
        var angle = Blockly.JavaScript.valueToCode(block, 'ANGLE', Blockly.JavaScript.ORDER_ATOMIC) || '0';
        return 'await drone.setAngle(' + angle + ');\n';
      };
      Blockly.JavaScript.forBlock['change_angle'] = block => {
        var angle = Blockly.JavaScript.valueToCode(block, 'ANGLE', Blockly.JavaScript.ORDER_ATOMIC) || '0';
        return 'await drone.changeAngle(' + angle + ');\n';
      };
      Blockly.JavaScript.forBlock['slide'] = block => {
        var slide = Blockly.JavaScript.valueToCode(block, 'SLIDE', Blockly.JavaScript.ORDER_ATOMIC) || '0';
        return 'await drone.slide(' + slide + ');\n';
      };
      Blockly.JavaScript.forBlock['walk'] = block => {
        var dist = Blockly.JavaScript.valueToCode(block, 'DIST', Blockly.JavaScript.ORDER_ATOMIC) || '0';
        return 'await drone.walk(' + dist + ');\n';
      };
      Blockly.JavaScript.forBlock['go_to'] = block => {
        var x = Blockly.JavaScript.valueToCode(block, 'X', Blockly.JavaScript.ORDER_ATOMIC) || '0';
        var y = Blockly.JavaScript.valueToCode(block, 'Y', Blockly.JavaScript.ORDER_ATOMIC) || '0';
        var z = Blockly.JavaScript.valueToCode(block, 'Z', Blockly.JavaScript.ORDER_ATOMIC) || '0';
        return 'await drone.goTo(' + x + ', ' + y + ', ' + z + ');\n';
      };
      Blockly.JavaScript.forBlock['move_by'] = block => {
        var x = Blockly.JavaScript.valueToCode(block, 'X', Blockly.JavaScript.ORDER_ATOMIC) || '0';
        var y = Blockly.JavaScript.valueToCode(block, 'Y', Blockly.JavaScript.ORDER_ATOMIC) || '0';
        var z = Blockly.JavaScript.valueToCode(block, 'Z', Blockly.JavaScript.ORDER_ATOMIC) || '0';
        return 'await drone.moveBy(' + x + ', ' + y + ', ' + z + ');\n';
      };
      Blockly.JavaScript.forBlock['return_to_base'] = block => 'await drone.returnToBase();\n';
      Blockly.JavaScript.forBlock['wait'] = block => {
        var dist = Blockly.JavaScript.valueToCode(block, 'DIST', Blockly.JavaScript.ORDER_ATOMIC) || '0';
        return 'await waitSeconds(' + dist + ');\n';
      };
      Blockly.JavaScript.forBlock['smoke'] = block => {
        var smoke = Blockly.JavaScript.valueToCode(block, 'SMOKE', Blockly.JavaScript.ORDER_ATOMIC) || '0';
        return `drone.smoke = (${smoke});\n`;
      };
      Blockly.JavaScript.forBlock['set_speed'] = block => {
        var speed = Blockly.JavaScript.valueToCode(block, 'SPEED', Blockly.JavaScript.ORDER_ATOMIC) || '1';
        return `drone.speed = ${speed};\n`;
      };
      
      //--- Sensor ---
      Blockly.JavaScript.forBlock['sensor_keypressed'] = block => {
        var key = block.getFieldValue('KEY');
        var code = "isKeyPressed('" + key + "')";
        return [code, Blockly.JavaScript.ORDER_NONE];
      };
      Blockly.JavaScript.forBlock['sensor_x'] = block => {
        var code = "-drone.mesh.position.z.toFixed(2)";
        return [code, Blockly.JavaScript.ORDER_NONE];
      };
      Blockly.JavaScript.forBlock['sensor_z'] = block => {
        var code = "-drone.mesh.position.x.toFixed(2)";
        return [code, Blockly.JavaScript.ORDER_NONE];
      };
      Blockly.JavaScript.forBlock['sensor_altitude'] = block => {
        var code = "drone.altitude.toFixed(2)";
        return [code, Blockly.JavaScript.ORDER_NONE];
      };
      Blockly.JavaScript.forBlock['sensor_direction'] = block => {
        var code = "-drone.direction.toFixed(2)";
        return [code, Blockly.JavaScript.ORDER_NONE];
      };
      Blockly.JavaScript.forBlock['sensor_speed'] = block => {
        return ['drone.speed', Blockly.JavaScript.ORDER_NONE];
      };
      //floor
      Blockly.JavaScript.forBlock['start_block'] = block => '';
      Blockly.JavaScript.forBlock['end_block'] = block => '';

      const originalProcedureCallReturn = Blockly.JavaScript.forBlock['procedures_callreturn'];
      if (originalProcedureCallReturn) {
        Blockly.JavaScript.forBlock['procedures_callnoreturn'] = (block, generator) => {
          const call = originalProcedureCallReturn(block, generator)[0];
          return 'await ' + call + ';\n';
        };
        Blockly.JavaScript.forBlock['procedures_callreturn'] = (block, generator) => {
          const call = originalProcedureCallReturn(block, generator)[0];
          return ['await ' + call, Blockly.JavaScript.ORDER_NONE];
        };
      }

      // Override math_random_int to use inline calculation instead of a helper function.
      // The global `function` → `async function` replacement in the run handler breaks
      // Blockly's built-in helper (it becomes async but calls to it aren't awaited).
      Blockly.JavaScript.forBlock['math_random_int'] = (block, generator) => {
        var from = generator.valueToCode(block, 'FROM', Blockly.JavaScript.ORDER_NONE) || '0';
        var to = generator.valueToCode(block, 'TO', Blockly.JavaScript.ORDER_NONE) || '0';
        var code = 'Math.floor(Math.random() * (' + to + ' - ' + from + ' + 1) + ' + from + ')';
        return [code, Blockly.JavaScript.ORDER_FUNCTION_CALL];
      };



      // --- Global variables ---
      let workspace, scene, camera, renderer, drone;
      let isResizing = false;
      let run=false
      let delay=100;
      const defaultFlightAltitude = 10.0;
      const getNumber = (value, fallback = 0) => {
        const number = Number(value);
        return Number.isFinite(number) ? number : fallback;
      };
      const getDuration = value => {
        const duration = getNumber(value);
        return duration > 0 ? duration : 0;
      };

      const commandQueue = [];

        const commandPromise = new Promise((resolve, reject) => {
          commandQueue.push(next => {
            let completed = false;
            const completeCommand = () => {
              if (completed) return;
              completed = true;
              resolve();
              next();
            };
            try {
              cmdFunction(completeCommand);
            } catch (error) {
              if (!completed) {
                completed = true;
                reject(error);
                next();
              }
            }
          });
        });
        if (commandQueue.length === 1) processQueue();
        return commandPromise;
      };
      const processQueue = () => {
        if (!commandQueue.length) return;
        const cmd = commandQueue.shift();
        cmd(processQueue);
      };
          
      const animateProperty = (setter, from, to, duration, onComplete) => {
        const safeDuration = getDuration(duration);
        if (safeDuration === 0) {
          setter(to);
          if (onComplete) onComplete();
          return;
        }
        const startTime = performance.now();
        const step = timestamp => {
          const progress = Math.min((timestamp - startTime) / safeDuration, 1);
          setter(from + (to - from) * progress);
          if (progress < 1) {
            requestAnimationFrame(step);
          } else if (onComplete) {
            onComplete();
          }
        };
        requestAnimationFrame(step);
      };

        collisionRaycaster.set(

        const intersections = collisionRaycaster.intersectObjects(meshes, false);
        if (!intersections.length) return 0;

function loadScenario(file) {
  if (!file) {
    return;
  }

  // Rimuove tutti gli oggetti tranne quelli marcati come 'keep'
        scene.children = scene.children.filter(child => child.userData.type === 'keep');
  collisionMeshes = [];
  groundMeshes = [];
  collectCollisionMeshes(scene);
  
  fetch('backgrounds/' + file)
    .then(response => {
      if (!response.ok) throw new Error(`HTTP error ${response.status}`);
      return response.json();
    })
    .then(data => {
      // --- CARICAMENTO TERRENO ---
      const textureName = data.groundTexture || 'grass.jpg';
      const hillHeight = data.hillHeight || 25; 

      const textureLoader = new THREE.TextureLoader();
      textureLoader.load(
        'textures/' + textureName,
        function(texture) {
          texture.wrapS = THREE.RepeatWrapping;
          texture.wrapT = THREE.RepeatWrapping;
          applyTextureQuality(texture);

          const planeSize = 4100;
          const textureSize = 1024;
          texture.repeat.set(planeSize / textureSize, planeSize / textureSize);

          // Rimuove terreni precedenti
          const oldPlanes = scene.children.filter(obj => obj.userData.ground);
          oldPlanes.forEach(p => {
            scene.remove(p);
            if (p.geometry) p.geometry.dispose();
            if (p.material) p.material.dispose();
          });
          collisionMeshes = [];
          groundMeshes = [];
          collectCollisionMeshes(scene);
          
          // --- IMPOSTAZIONI FOGLIA ---
          if (data.fog) {
            const color = new THREE.Color(data.fog.color || 0x87ceeb);
            const near = data.fog.near !== undefined ? data.fog.near : 200;
            const far = data.fog.far !== undefined ? data.fog.far : 2500;
            scene.fog = new THREE.Fog(color, near, far);
            scene.background = color;
          } else {
            // Se non specificato, usa il default
            const defaultColor = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(defaultColor, 200, 2500);
            scene.background = defaultColor;
          }

            const distance = Math.sqrt(v.x * v.x + v.y * v.y);

            targetY = getNumber(targetY, this.altitude);
            targetZ = getNumber(targetZ, this.mesh.position.z);
            if (this.flying) {

                const startY = this.altitude;
                const startZ = this.mesh.position.z;
                const safeTargetY = Math.max(targetY, getSafeAltitudeAt(targetX, targetZ));
                const deltaX = targetX - startX;
                const deltaY = safeTargetY - startY;
                const deltaZ = targetZ - startZ;
                const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY + deltaZ * deltaZ);
                const horizontalDistance = Math.sqrt(deltaX * deltaX + deltaZ * deltaZ);

                this.speed = Math.min(Math.max(getNumber(this.speed, 1.0), 0.0), 10.0);
                if (distance === 0 || this.speed === 0) {
                  updateDroneSound(basePlaybackRate);
                  next();
                  if (callback) callback();
                  return;
                }

                const startDirection = normalizeDegrees(this.direction);
                const targetDirection = horizontalDistance > 0
                  ? normalizeDegrees(THREE.MathUtils.radToDeg(Math.atan2(deltaX, deltaZ)) + 90)
                  : startDirection;
                const yawDelta = getShortestAngleDelta(startDirection, targetDirection);
                const moveDuration = distance * 50 / this.speed;
                const leanAngle = horizontalDistance > 0 ? 10 : 0;

                const move = () => {
                  animateProperty(
                    val => {
                      this.mesh.rotation.z = THREE.MathUtils.degToRad(leanAngle * val);
                    },
                    0, 1, 100,
                    () => {
                      animateProperty(
                        val => {
                          const currentX = startX + deltaX * val;
                          const currentZ = startZ + deltaZ * val;
                          const minAltitude = getSafeAltitudeAt(currentX, currentZ);
                          const currentY = Math.max(startY + deltaY * val, minAltitude);
                          this.mesh.position.x = currentX;
                          this.mesh.position.y = currentY;
                          this.mesh.position.z = currentZ;
                          this.altitude = currentY;
                          updateStatus();
                        },
                        0, 1, moveDuration,
                        () => {
                          this.mesh.position.x = targetX;
                          this.mesh.position.y = Math.max(safeTargetY, getSafeAltitudeAt(targetX, targetZ));
                          this.mesh.position.z = targetZ;
                          this.altitude = this.mesh.position.y;
                          animateProperty(
                            val => {
                              this.mesh.rotation.z = THREE.MathUtils.degToRad(leanAngle * (1 - val));
                            },
                            0, 1, 100,
                            () => {
                              this.direction = targetDirection;
                              this.mesh.rotation.y = THREE.MathUtils.degToRad(this.direction);
                              this.mesh.rotation.z = 0;
                              updateDroneSound(basePlaybackRate);
                              updateStatus();
                              next();
                              if (callback) callback();
                            }
                          );
                        }
                      );
                    }
                  );
                };

                if (horizontalDistance > 0) {
                  animateProperty(
                    val => {
                      this.direction = normalizeDegrees(startDirection + yawDelta * val);
                      this.mesh.rotation.y = THREE.MathUtils.degToRad(this.direction);
                      updateStatus();
                    },
                    0, 1, 250,
                    move
                  );
                } else {
                  move();
                }
              });
            } else if (callback) callback();
            return Promise.resolve();
          }

      let smokeTrail = [];
      let smokeLine = null;
      const MAX_SMOKE_POINTS = 30000;
      const smokePositions = new Float32Array(MAX_SMOKE_POINTS * 3);
      const smokeBufferGeo = new THREE.BufferGeometry();
      smokeBufferGeo.setAttribute('position', new THREE.BufferAttribute(smokePositions, 3));
      smokeBufferGeo.setDrawRange(0, 0);
      const smokeLineMat = new THREE.LineBasicMaterial({
        color: 0x2f3438,
        transparent: true,
        opacity: 0.9,
      });

      function clearSmokeTrail() {
        if (smokeLine) {
          scene.remove(smokeLine);
          smokeLine = null;
        }
        smokeTrail = [];
        lastSmokeTime = 0;
        smokeBufferGeo.setDrawRange(0, 0);
      }

      function updateSmokeLine() {
        // Remove old line object if still in scene (shouldn't happen after first draw)
        if (smokeLine) {
          scene.remove(smokeLine);
          smokeLine = null;
        }
        if (smokeTrail.length < 2) {
          smokeBufferGeo.setDrawRange(0, 0);
          return;
        }

        const count = Math.min(smokeTrail.length, MAX_SMOKE_POINTS);
        const offset = smokeTrail.length > MAX_SMOKE_POINTS
          ? smokeTrail.length - MAX_SMOKE_POINTS
          : 0;

        for (let i = 0; i < count; i++) {
          const p = smokeTrail[offset + i];
          smokePositions[i * 3]     = p.x;
          smokePositions[i * 3 + 1] = p.y;
          smokePositions[i * 3 + 2] = p.z;
        }
        smokeBufferGeo.attributes.position.needsUpdate = true;
        smokeBufferGeo.setDrawRange(0, count);

        if (!smokeLine) {
          smokeLine = new THREE.Line(smokeBufferGeo, smokeLineMat);
          smokeLine.frustumCulled = false;
          smokeLine.userData.type = 'keep';
          smokeLine.userData.noCollision = true;
          smokeLine.userData.noShadow = true;
          scene.add(smokeLine);
        }
      }

      function addSmokePoint(position) {
        if (smokeTrail.length >= MAX_SMOKE_POINTS) return;
        const now = performance.now();
        if (now - lastSmokeTime < activeGraphicsProfile.smokeInterval) return;

        const point = position.clone();
        point.y = Math.max(point.y - 0.25, getGroundHeightAt(point.x, point.z) + 0.2);
        const previous = smokeTrail[smokeTrail.length - 1];
        if (previous && previous.distanceTo(point) < 0.2) return;

        lastSmokeTime = now;
        smokeTrail.push(point);
        updateSmokeLine();
      }

        document.getElementById('x').value = -drone.mesh.position.z.toFixed(2);
        document.getElementById('z').value = -drone.mesh.position.x.toFixed(2);
        document.getElementById('altitude').value = drone.altitude.toFixed(2);
        document.getElementById('direction').value = ((-drone.direction.toFixed(0) % 360) + 360) % 360 ;
        document.getElementById('flightStatus').innerText = drone.flying
  ? (Blockly.Msg["BKY_FLIGHT_IN_FLIGHT"] || "In Flight")
  : (Blockly.Msg["BKY_FLIGHT_ON_GROUND"] || "On Ground");
      };

      const setupStatusInputs = () => {
        document.getElementById('z').addEventListener('change', e => {
          drone.mesh.position.x = -parseFloat(e.target.value);
          enforceTerrainCollision();
        }, { passive: true });
        document.getElementById('x').addEventListener('change', e => {
          drone.mesh.position.z = -parseFloat(e.target.value);
          enforceTerrainCollision();
        }, { passive: true });
        document.getElementById('altitude').addEventListener('change', e => {
          drone.mesh.position.y = parseFloat(e.target.value);
          enforceTerrainCollision();
        }, { passive: true });
        document.getElementById('direction').addEventListener('change', e => {
          drone.mesh.rotation.y = THREE.MathUtils.degToRad( parseFloat(-e.target.value));        
        }, { passive: true });
      };

      // --- Animation loop ---
      const animate = () => {
        requestAnimationFrame(animate);
        if (drone && drone.mesh) {
          enforceTerrainCollision();
          const offset = cameraOffset.clone();
          const spherical = new THREE.Spherical().setFromVector3(offset);
          spherical.theta += cameraAngle.x;
          spherical.phi += cameraAngle.y;
          spherical.phi = Math.max(THREE.MathUtils.degToRad(10), Math.min(THREE.MathUtils.degToRad(85), spherical.phi));
          offset.setFromSpherical(spherical);
          camera.position.copy(drone.mesh.position).add(offset);
          camera.lookAt(drone.mesh.position);
          updateDroneGuides();

          // Keep directional light and its shadow camera centred on the drone
          if (directionalLight) {
            directionalLight.position.set(drone.mesh.position.x, drone.mesh.position.y + 100, drone.mesh.position.z);
            directionalLight.target.position.copy(drone.mesh.position);
            directionalLight.target.updateMatrixWorld();
          }

          if (drone.smoke){
            if (drone.flying && drone.mesh) {
              const pos = drone.mesh.position.clone();
              addSmokePoint(pos);
            }
          }
        }
        renderer.render(scene, camera);
      };

      // --- Scene reset ---
      const resetCameraView = () => {
        cameraAngle.x = Math.PI / 2;
        cameraAngle.y = 0;
        cameraOffset.copy(defaultCameraOffset);
        camera.position.set(4, 0, 4);
      };

      const resetScene = () => {
        const startAltitude = getSafeAltitudeAt(0, 0);
        drone.mesh.position.set(0, startAltitude, 0);
        drone.mesh.rotation.y = 0;
        drone.altitude = startAltitude;
        drone.direction = 0;
        drone.smoke = 0; 
        resetCameraView();
        clearInterval(drone.propellerInterval); 
        drone.flying = false;
        updateStatus();

        clearSmokeTrail();
        updateDroneGuides();
      };

      // --- Menu button handlers ---
      document.getElementById('newBtn').addEventListener('click', () => {
        setProgramName(defaultProgramName);
        loadWorkspaceFromXmlText(defaultWorkspaceXmlText);
      });
      document.getElementById('saveBtn').addEventListener('click', () => {
        const requestedName = prompt(Blockly.Msg.BKY_SAVE_PROMPT || 'File name:', programName);
        if (requestedName === null) return;
        setProgramName(requestedName);
        const xml_text = getWorkspaceXmlText();
        saveProgramToLocalStorage();
        const blob = new Blob([xml_text], { type: 'text/xml' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = programName + '.xml';
        a.click();
      }, { passive: true });
      document.getElementById('loadBtn').addEventListener('click', () => {
        document.getElementById('fileInput').click();
      });
      document.getElementById('fileInput').addEventListener('change', event => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
          const xml_text = e.target.result;
          if (loadWorkspaceFromXmlText(xml_text, false)) {
            setProgramName(file.name);
            saveProgramToLocalStorage();
          }
          event.target.value = '';
        };
        reader.readAsText(file);
      }, { passive: true });
      document.getElementById('runBtn').addEventListener('click', () => {
        if (run==false){
          initAudio();
          document.getElementById("stopBtn").disabled = false;
          document.getElementById("runBtn").disabled = true;
          resetScene();
          var code = Blockly.JavaScript.workspaceToCode(workspace);
          delay = 10;
          run=true;
          code=code.replace(/\bfunction\b/g, 'async function');
          code=code.replace(/\n/g, ';\n  await sleep(delay);delay=10;if(run!=true)return;');
          var wrappedCode = `
            async function _run() {
              ${code}
              document.getElementById('stopBtn').click();
            }
            _run();
          `;
          console.log(wrappedCode);
          eval(wrappedCode);
        }
      }, { passive: true });
      document.getElementById('stopBtn').addEventListener('click', () => {
        if (run==true){
          document.getElementById("runBtn").disabled = false;
          commandQueue.length = 0;
          run=false;
          stopDroneSound();
          clearInterval(drone.propellerInterval);
        }
        else{
          setTimeout(resetScene,delay);       
          document.getElementById("stopBtn").disabled = true;
        }
      }, { passive: true });
                
      // --- Divider management for resizing ---
      let fullScreen = false;
      document.getElementById('toggleWebglBtn').addEventListener('click', () => {
        const leftPanel = document.getElementById('leftPanel');
        const divider = document.getElementById('divider');
        const rightPanel = document.getElementById('rightPanel');
        const statusPanel = document.getElementById('statusPanel');
          
        if (!fullScreen) {
          leftPanel.style.display = 'none';
          divider.style.display = 'none';
          rightPanel.style.width = '100%';
          statusPanel.style.display = 'none';
          document.getElementById('toggleWebglBtn').innerText = "🗗";
        } else {
          leftPanel.style.display = '';
          divider.style.display = '';
          rightPanel.style.width = '';
          statusPanel.style.display = '';
          document.getElementById('toggleWebglBtn').innerText = "🗖";
        }
        fullScreen = !fullScreen;
        updateWebGLCanvas();
      }, { passive: true });

      divider.addEventListener('mousedown', () => { isResizing = true; });
      document.addEventListener('mousemove', e => {
        if (!isResizing) return;
        const containerOffsetLeft = container.offsetLeft;
        let pointerX = e.clientX - containerOffsetLeft;
        const minWidth = 200;
        const maxWidth = container.clientWidth - 200;
        pointerX = Math.max(minWidth, Math.min(pointerX, maxWidth));
        leftPanel.style.width = pointerX + "px";
        Blockly.svgResize(workspace);
        updateWebGLCanvas();
      }, { passive: true });
      document.addEventListener('mouseup', () => { isResizing = false; }, { passive: true });
        
      // --- Localization ---
      const loadedLanguageFiles = new Set(['en']);

      function loadLanguageFile(lang, callback) {
        if (loadedLanguageFiles.has(lang)) {
          if (callback) callback();
          return;
        }
        var script = document.createElement('script');
        script.src = 'libs/Msg/' + lang + '.js';
        script.onload = function() {
          loadedLanguageFiles.add(lang);
          if (callback) callback();
        };
        document.head.appendChild(script);
      }

      function updateLanguage(selectedLang) {
        const currentLang = localStorage.getItem('selectedLanguage') || 'en';
        localStorage.setItem('selectedLanguage', selectedLang);
        if (selectedLang !== currentLang) {
          location.reload();
        }
      }

      document.getElementById('languageSelect').addEventListener('change', function() {
        var selectedLang = this.value;
        loadLanguageFile(selectedLang, function() {
          updateLanguage(selectedLang);
        });
      }, { passive: true });
      
      document.getElementById('scenarioSelect').addEventListener('change', function() {
        const selectedScenario = this.value;
        loadScenario(selectedScenario);
        setTimeout(() => {
          resetCameraView();
          resetScene();
        }, 500);
      });

      document.getElementById('graphicsSelect').addEventListener('change', function() {
        applyGraphicsProfile(this.value);
      }, { passive: true });

      document.getElementById('helpBtn').addEventListener('click', function() {
        const lang = document.getElementById('languageSelect').value;
        const helpFiles = {
          en: 'doc/help.html',
          it: 'doc/help-it.html',
          fr: 'doc/help-fr.html',
          de: 'doc/help-de.html',
          es: 'doc/help-es.html',
          pt: 'doc/help-pt.html'
        };
        const helpPage = helpFiles[lang] || 'doc/help.html';
        window.open(helpPage, '_blank');
      });
              
      function loadScenarioList() {
        fetch('backgrounds/list.json')
          .then(response => response.json())
          .then(data => {
            const scenarioSelect = document.getElementById('scenarioSelect');
            scenarioSelect.innerHTML = '<option value=""></option>';
if (scenarioSelect.options[0]) scenarioSelect.options[0].text = Blockly.Msg.BKY_SCENARIO || 'Scenario';
            data.forEach(scenario => {
              const option = document.createElement('option');
              option.value = scenario.file;
              option.text = scenario.name;
              scenarioSelect.appendChild(option);
            });
          })
          .catch(err => console.error('Errore caricando la lista degli scenari:', err));
      }

      window.onload = function() {
          var savedLang = localStorage.getItem('selectedLanguage') || 'en';
          document.getElementById('languageSelect').value = savedLang;
          loadLanguageFile(savedLang, function() {
            localStorage.setItem('selectedLanguage', savedLang);
            defineCustomBlocks();
            initBlockly();
            restoreProgramFromLocalStorage();
            initThree();
            document.getElementById('graphicsSelect').value = graphicsProfileName;
            applyGraphicsProfile(graphicsProfileName);
            updateWebGLCanvas();
            animate();
            loadScenarioList();
          });
      };
    </script>
  </body>
</html>
