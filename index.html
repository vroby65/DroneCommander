<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="Drone Commander.png">
    <title>Drone Commander</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: sans-serif;
        overflow: hidden;
      }
      #container {
        display: flex;
        height: 100%;
        width: 100%;
      }
      #leftPanel {
        width: calc(100% - 500px);
        padding: 10px;
        box-sizing: border-box;
        background: #f0f0f0;
        overflow: auto;
      }
      #divider {
        width: 5px;
        background-color: #ccc;
        cursor: ew-resize;
      }
      #rightPanel {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
      }
      #rightPanel  button {
        font-size: 16px; 
        line-height: 1;
        padding: 5px 10px;
        margin:2px;
        vertical-align: middle;
        margin-right: 5px;
      }
      #webglContainer {
        flex: 3;
        position: relative;
        overflow: hidden;
        background: #ddd;
      }
      #statusPanel {
        flex: 1;
        background: #ddd;
        padding: 10px;
        overflow: auto;
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 75px;
        font-size: 12px;
      }
      #statusPanel table {
        width: calc(100% - 50px);
      }
      #statusPanel input {
        width: 50px;
      }
      #blocklyDiv {
        height: calc(100% - 50px);
        width: 100%;
        border: 1px solid #ccc;
      }
      #menu {        
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 5px;
        flex-wrap: wrap;
      }
      #menu img {
        margin-top: -23px;
        margin-bottom: -23px;
      }
      #scenarioControls {
        display: flex;
        gap: 5px;
        flex: 0 1 260px;
        min-width: 220px;
      }
      #scenarioControls select {
        flex: 1;
        min-width: 0;
      }
      #viewerToolbar {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        min-height: 36px;
        padding-left: 6px;
        padding-right: 6px;
        box-sizing: border-box;
      }
      #fileNameLabel {
        max-width: 180px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
        font-weight: bold;
        margin: 0 auto 0 2px;
      }
      button{
        margin-right:5px;
      }
      
      .blocklyTreeLabel {
        padding: 4px 8px;
        font-size: 16px;
        font-weight: bold;
        font-family: "Segoe UI", sans-serif;
      }

      .blocklyTreeRow {
        background: none !important; 
        border-radius: 0 !important;
        margin-bottom: 2px;
      }

      .blocklyTreeRow:hover {
        background-color: #e0e0e0 !important;
      }

      .blocklyToolboxCategory[data-category-id="logic"] > .blocklyTreeRow > .blocklyTreeLabel { color: #4B9CD3; }
      .blocklyToolboxCategory[data-category-id="loops"] > .blocklyTreeRow > .blocklyTreeLabel { color: #F7C948; }
      .blocklyToolboxCategory[data-category-id="math"] > .blocklyTreeRow > .blocklyTreeLabel { color: #F86624; }
      .blocklyToolboxCategory[data-category-id="text"] > .blocklyTreeRow > .blocklyTreeLabel { color: #8C6BB1; }
      .blocklyToolboxCategory[data-category-id="lists"] > .blocklyTreeRow > .blocklyTreeLabel { color: #3AAFB9; }
      .blocklyToolboxCategory[data-category-id="variables"] > .blocklyTreeRow > .blocklyTreeLabel { color: #FF8C42; }
      .blocklyToolboxCategory[data-category-id="functions"] > .blocklyTreeRow > .blocklyTreeLabel { color: #DB5461; }
      .blocklyToolboxCategory[data-category-id="drone"] > .blocklyTreeRow > .blocklyTreeLabel { color: #20A39E; }
      .blocklyToolboxCategory[data-category-id="sensors"] > .blocklyTreeRow > .blocklyTreeLabel { color: #90BE6D; }
      .blocklyToolboxCategory[data-category-id="flow"] > .blocklyTreeRow > .blocklyTreeLabel { color: #888888; }
      
    </style>
    <!-- Include Blockly -->
    <script src="libs/blockly_compressed.min.js"></script>
    <script src="libs/blocks_compressed.min.js"></script>
    <script src="libs/Msg/en.js"></script>
    <script src="libs/javascript_compressed.min.js"></script>
    <!-- Include Three.js -->
    <script src="libs/three.min.js"></script>
    <script src="libs/STLLoader.js"></script>  
    <script src="libs/MTLLoader.js"></script>  
    <script src="libs/OBJLoader.js"></script>  
    
  </head>
  <body>
    <div id="container">
      <div id="leftPanel">
        <div id="menu">
          <img src="Drone Commander.png" width="64px">    
          <select id="languageSelect">
            <option value="en">English</option>
            <option value="it">Italiano</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
            <option value="pt">Português</option>
          </select>
          <button id="newBtn">New</button>
          <button id="loadBtn">Load</button>
          <button id="saveBtn">Save</button>
          <div id="scenarioControls">
            <select id="scenarioSelect">
              <option value=""></option>
            </select>
            <select id="graphicsSelect">
              <option value="performance"></option>
              <option value="balanced"></option>
              <option value="quality"></option>
            </select>
            <button id="helpBtn"></button>
          </div>

          <input type="file" id="fileInput" style="display:none">
        </div>
        <div id="blocklyDiv"></div>
      </div>
      <div id="divider"></div>
      <div id="rightPanel">
        <div id="viewerToolbar">
          <button id="toggleWebglBtn" >🗖</button>
          <span id="fileNameLabel"></span>
          <button id="runBtn" ><font color='green'>▶</font></button>
          <button id="stopBtn" disabled ><font color='red'>■</font></button>
        </div>
        <div id="webglContainer"></div>
        <div id="statusPanel">
          <table>
            <tr>
              <td id="labelX">X:</td><td><input type="number" id="x" value="0" step="0.1"></td>
              <td id="labelZ">Z:</td><td><input type="number" id="z" value="0" step="0.1"></td>
            </tr>
            <tr>
              <td id="labelAlt">Altitude:</td><td><input type="number" id="altitude" value="1.5" step="0.1"></td>
              <td id="labelDir">Direction:</td><td><input type="number" id="direction" value="0" step="1"></td>
            </tr>
            <tr>
              <td colspan="2"><span id="labelStatus">Status:</span> <span id="flightStatus">On Ground</span></td>
            </tr>
          </table>
        </div>
      </div>
    </div>
    
    <script src="js/blockly.js"></script>
    <script src="js/drone-commands.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
